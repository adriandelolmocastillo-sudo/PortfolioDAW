<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        let numero = prompt('Introduce un numero: ');
         if (numero == 1){
            document.write('Enero');
         }else if (numero == 2){
            document.write('Febrero');
         }else if (numero == 3){
            document.write('Marzo');
         }else if (numero == 4){
            document.write('Abril');
         }else if (numero == 5){
            document.write('Mayo');
         }else if (numero == 6){
            document.write('Junio');
         }else if (numero == 7){
            document.write('Julio');
         }else if (numero == 8){
            document.write('Agosto');
         }else if (numero == 9){
            document.write('Septiembre');
         }else if (numero == 10){
            document.write('Octubre');
         }else if (numero == 11){
            document.write('Noviembre');
         }else if (numero == 12){
            document.write('Diciembre');
        }else{
           document.write('Número no valido');
        }
 
    </script>
</head>

</html>
