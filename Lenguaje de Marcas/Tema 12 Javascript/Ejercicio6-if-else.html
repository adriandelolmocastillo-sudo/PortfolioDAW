<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        let hora = 16;
        let extra = 20;
        let horas = prompt('Cuantas horas has trabajado: ');
  
        if (horas <= 40) {
            document.write('Tu sueldo es: ' + horas * hora + '€')
        }else{
            document.write('Tu sueldo es: ' + horas * extra + '€')
        }
    </script>
</head>

</body>
</html>
